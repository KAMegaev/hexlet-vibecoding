<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор калорий</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card">
    <h1>Калькулятор калорий</h1>
    <p class="subtitle">Расчёт суточной нормы по формуле Миффлина — Сан Жеора</p>

    <form id="calc-form" novalidate>
      <fieldset class="gender">
        <legend>Пол</legend>
        <label class="radio">
          <input type="radio" name="gender" value="male" checked />
          <span>👨 Мужчина</span>
        </label>
        <label class="radio">
          <input type="radio" name="gender" value="female" />
          <span>👩 Женщина</span>
        </label>
      </fieldset>

      <div class="field">
        <label for="age">Возраст, лет</label>
        <input type="number" id="age" name="age" min="10" max="120" step="1" placeholder="30" required />
      </div>

      <div class="field">
        <label for="weight">Вес, кг</label>
        <input type="number" id="weight" name="weight" min="20" max="400" step="0.1" placeholder="70" required />
      </div>

      <div class="field">
        <label for="height">Рост, см</label>
        <input type="number" id="height" name="height" min="100" max="250" step="1" placeholder="175" required />
      </div>

      <div class="field">
        <label for="activity">Уровень активности</label>
        <select id="activity" name="activity">
          <option value="1.2">Минимальный (сидячий образ жизни)</option>
          <option value="1.375">Низкий (1–3 тренировки в неделю)</option>
          <option value="1.55" selected>Средний (3–5 тренировок в неделю)</option>
          <option value="1.725">Высокий (6–7 тренировок в неделю)</option>
          <option value="1.9">Очень высокий (физический труд / 2 раза в день)</option>
        </select>
      </div>

      <div class="field">
        <label for="goal">Цель</label>
        <select id="goal" name="goal">
          <option value="0.8">Похудение (−20%)</option>
          <option value="1" selected>Поддержание веса</option>
          <option value="1.15">Набор массы (+15%)</option>
        </select>
      </div>

      <button type="submit">Рассчитать</button>
    </form>

    <p id="error" class="error" hidden></p>

    <section id="result" class="result" hidden>
      <div class="result-main">
        <span class="result-label">Ваша суточная норма</span>
        <span class="result-value"><span id="goal-calories">0</span> ккал</span>
      </div>
      <dl class="result-grid">
        <div>
          <dt>BMR (базовый обмен)</dt>
          <dd><span id="bmr">0</span> ккал</dd>
        </div>
        <div>
          <dt>Поддержание веса</dt>
          <dd><span id="tdee">0</span> ккал</dd>
        </div>
      </dl>
      <div class="macros">
        <h2>Распределение БЖУ</h2>
        <div class="macro"><span>Белки</span><strong><span id="protein">0</span> г</strong></div>
        <div class="macro"><span>Жиры</span><strong><span id="fat">0</span> г</strong></div>
        <div class="macro"><span>Углеводы</span><strong><span id="carbs">0</span> г</strong></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
